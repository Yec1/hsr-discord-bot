<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>電子郵件驗證</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
		<style>
			:root {
				--primary: #38bdf8;
				--bg-dark: #020617;
				--glass-bg: rgba(30, 41, 59, 0.7);
				--glass-border: rgba(255, 255, 255, 0.1);
				--text-main: #f1f5f9;
				--text-dim: #94a3b8;
			}
			* { box-sizing: border-box; }
			body {
				font-family: "Outfit", sans-serif;
				padding: 0; margin: 0;
				background-color: var(--bg-dark);
				color: var(--text-main);
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
			}
			.container { width: 90%; max-width: 440px; }
			.card {
				background: var(--glass-bg);
				backdrop-filter: blur(12px);
				padding: 3rem 2rem;
				border-radius: 2rem;
				border: 1px solid var(--glass-border);
				box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
				text-align: center;
			}
			.logo {
				font-size: 2.2rem;
				font-weight: 700;
				background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
				-webkit-background-clip: text;
				background-clip: text;
				-webkit-text-fill-color: transparent;
				margin-bottom: 0.5rem;
			}
			.subtitle { color: var(--text-dim); font-size: 1rem; margin-bottom: 2rem; font-weight: 300; }
			.input-group { margin-bottom: 1.5rem; text-align: left; }
			.input-group label { display: block; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 0.5rem; }
			.input-group input {
				width: 100%;
				background: rgba(0,0,0,0.3);
				border: 1px solid var(--glass-border);
				border-radius: 0.75rem;
				padding: 0.75rem 1rem;
				color: var(--text-main);
				font-family: inherit;
				font-size: 1.2rem;
				letter-spacing: 0.2em;
				text-align: center;
				outline: none;
				transition: border-color 0.2s;
			}
			.input-group input:focus { border-color: var(--primary); }
			.btn {
				width: 100%;
				padding: 0.85rem;
				border-radius: 9999px;
				border: none;
				background: linear-gradient(135deg, var(--primary) 0%, #0284c7 100%);
				color: white;
				font-family: inherit;
				font-size: 1rem;
				font-weight: 600;
				cursor: pointer;
				transition: opacity 0.2s, transform 0.2s;
			}
			.btn:hover { opacity: 0.9; transform: scale(1.02); }
			.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
			.status { margin-top: 1rem; font-size: 0.95rem; min-height: 24px; }
			.status.error { color: #f87171; }
			.status.success { color: #34d399; }
			.success-area { display: none; }
			.check-icon { font-size: 4rem; color: #10b981; margin-bottom: 1rem; }
			.btn-discord {
				margin-top: 1rem;
				display: inline-block;
				background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
				color: white;
				padding: 0.8rem 2rem;
				border-radius: 9999px;
				text-decoration: none;
				font-weight: 600;
			}
			.footer { margin-top: 2rem; font-size: 0.8rem; color: var(--text-dim); opacity: 0.5; }
		</style>
	</head>
	<body>
		<div class="container">
			<div class="card">
				<div id="main-ui">
					<div class="logo">電子郵件驗證</div>
					<div class="subtitle">請輸入您電子郵件中收到的驗證碼</div>
					<div class="input-group">
						<label>驗證碼</label>
						<input id="code-input" type="text" maxlength="6" placeholder="000000" autocomplete="one-time-code" inputmode="numeric" />
					</div>
					<button class="btn" id="submit-btn" onclick="submitCode()">確認送出</button>
					<div class="status" id="status-text"></div>
				</div>
				<div id="success-ui" class="success-area">
					<div class="check-icon">✓</div>
					<h2 style="margin:0;color:#fff">驗證成功</h2>
					<p style="color:var(--text-dim);margin:1rem 0 2rem">結果已傳送至機器人，您可以關閉此分頁。</p>
					<a href="https://discord.com/app" class="btn-discord">回到 Discord</a>
				</div>
				<div class="footer">Powered by Verification Hub</div>
			</div>
		</div>
		<script>
			const params = new URLSearchParams(window.location.search);
			const sessionId = params.get("session");

			if (!sessionId) {
				document.getElementById("status-text").textContent = "❌ 無效的連結，請重新從 Discord 發起指令";
				document.getElementById("status-text").className = "status error";
				document.getElementById("submit-btn").disabled = true;
			}

			document.getElementById("code-input").addEventListener("keydown", e => {
				if (e.key === "Enter") submitCode();
			});

			async function submitCode() {
				const code = document.getElementById("code-input").value.trim();
				if (!code || code.length < 6) {
					document.getElementById("status-text").textContent = "❌ 請輸入完整的 6 位數驗證碼";
					document.getElementById("status-text").className = "status error";
					return;
				}

				document.getElementById("submit-btn").disabled = true;
				document.getElementById("status-text").textContent = "正在驗證...";
				document.getElementById("status-text").className = "status";

				try {
					const res = await fetch("/callback", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ sessionId, result: { code } })
					});
					const data = await res.json();
					if (data.success) {
						pollStatus();
					} else {
						document.getElementById("status-text").textContent = `❌ ${data.message || "傳送失敗，請重試"}`;
						document.getElementById("status-text").className = "status error";
						document.getElementById("submit-btn").disabled = false;
					}
				} catch (e) {
					document.getElementById("status-text").textContent = "❌ 連線失敗，請重試";
					document.getElementById("status-text").className = "status error";
					document.getElementById("submit-btn").disabled = false;
				}
			}

			function pollStatus() {
				let elapsed = 0;
				const timer = setInterval(async () => {
					elapsed += 1000;
					if (elapsed > 30000) {
						clearInterval(timer);
						document.getElementById("status-text").textContent = "❌ 等待逾時，請重試";
						document.getElementById("status-text").className = "status error";
						document.getElementById("submit-btn").disabled = false;
						return;
					}
					try {
						const res = await fetch(`/session-status/${sessionId}`);
						const data = await res.json();
						if (data.status === "done") {
							clearInterval(timer);
							document.getElementById("main-ui").style.display = "none";
							document.getElementById("success-ui").style.display = "block";
						} else if (data.status === "needs_geetest_in_discord") {
							clearInterval(timer);
							document.getElementById("status-text").innerHTML = `✅ 驗證碼確認成功！<br>請回到 Discord 點擊「前往驗證」按鈕完成人機驗證後即可登入。`;
							document.getElementById("status-text").className = "status success";
						} else if (data.status === "needs_email_verify" && data.error) {
							clearInterval(timer);
							document.getElementById("status-text").textContent = `❌ ${data.error}`;
							document.getElementById("status-text").className = "status error";
							document.getElementById("submit-btn").disabled = false;
						} else if (data.status === "error") {
							clearInterval(timer);
							document.getElementById("status-text").textContent = `❌ ${data.message || "驗證失敗"}`;
							document.getElementById("status-text").className = "status error";
							document.getElementById("submit-btn").disabled = false;
						}
						// "processing" or "needs_email_verify" without error → keep polling
					} catch (e) { /* ignore, keep polling */ }
				}, 1000);
			}
		</script>
	</body>
</html>
