<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="referrer" content="no-referrer" />
		<title>Mihoyo Verification Hub</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
			rel="stylesheet"
		/>
		<script src="https://static.geetest.com/static/tools/gt.js"></script>
		<script src="https://static.geetest.com/v4/gt4.js"></script>
		<style>
			:root {
				--primary: #38bdf8; /* Mihoyo Cyan-ish / Universal Blue */
				--primary-dark: #0284c7;
				--bg-dark: #020617;
				--glass-bg: rgba(30, 41, 59, 0.7);
				--glass-border: rgba(255, 255, 255, 0.1);
				--text-main: #f1f5f9;
				--text-dim: #94a3b8;
			}

			* {
				box-sizing: border-box;
				transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			}

			body {
				font-family: "Outfit", sans-serif;
				padding: 0;
				margin: 0;
				background-color: var(--bg-dark);
				color: var(--text-main);
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				overflow: hidden;
				position: relative;
			}

			body::before,
			body::after {
				content: "";
				position: absolute;
				width: 50vmax;
				height: 50vmax;
				filter: blur(80px);
				opacity: 0.15;
				z-index: -1;
				animation: move 20s infinite alternate;
			}

			body::before {
				background: radial-gradient(
					circle,
					var(--primary) 0%,
					transparent 70%
				);
				top: -10%;
				left: -10%;
			}

			body::after {
				background: radial-gradient(
					circle,
					#7c3aed 0%,
					transparent 70%
				);
				bottom: -10%;
				right: -10%;
				animation-delay: -5s;
			}

			@keyframes move {
				from {
					transform: translate(0, 0) scale(1);
				}
				to {
					transform: translate(10%, 10%) scale(1.2);
				}
			}

			.container {
				width: 90%;
				max-width: 480px;
				perspective: 1000px;
			}

			.card {
				background: var(--glass-bg);
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
				padding: 3rem 2rem;
				border-radius: 2rem;
				border: 1px solid var(--glass-border);
				box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
				text-align: center;
				position: relative;
			}

			.logo {
				font-size: 2.5rem;
				font-weight: 700;
				background: linear-gradient(
					135deg,
					#fff 30%,
					var(--primary) 100%
				);
				-webkit-background-clip: text;
				background-clip: text;
				-webkit-text-fill-color: transparent;
				margin-bottom: 0.5rem;
				letter-spacing: -0.02em;
			}

			.subtitle {
				color: var(--text-dim);
				font-size: 1rem;
				margin-bottom: 2.5rem;
				font-weight: 300;
			}

			.status-msg {
				font-size: 1.1rem;
				color: var(--primary);
				margin: 1.5rem 0;
				min-height: 28px;
				font-weight: 400;
			}

			#captcha {
				margin: 1.5rem 0;
				display: flex;
				justify-content: center;
				min-height: 50px;
			}

			.success-area {
				display: none;
				animation: fadeIn 0.6s ease;
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.check-icon {
				font-size: 4rem;
				color: #10b981;
				margin-bottom: 1rem;
			}

			.btn-discord {
				margin-top: 1rem;
				display: inline-block;
				background: linear-gradient(135deg, #5865f2 0%, #4752c4 100%);
				color: white;
				padding: 0.8rem 2rem;
				border-radius: 9999px;
				text-decoration: none;
				font-weight: 600;
				box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
			}

			.btn-discord:hover {
				transform: scale(1.05);
				box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
			}

			.footer {
				margin-top: 2rem;
				font-size: 0.8rem;
				color: var(--text-dim);
				opacity: 0.5;
			}

			.spinner {
				width: 40px;
				height: 40px;
				border: 3px solid rgba(56, 189, 248, 0.1);
				border-radius: 50%;
				border-top-color: var(--primary);
				animation: spin 1s linear infinite;
				margin: 0 auto;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			.error-pre {
				background: rgba(0, 0, 0, 0.3);
				padding: 1rem;
				border-radius: 0.5rem;
				font-size: 0.75rem;
				color: #f87171;
				text-align: left;
				overflow: auto;
				margin-top: 1rem;
			}
			.retry-btn {
				margin-top: 10px;
				padding: 8px 16px;
				background-color: #f4b400;
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
				font-size: 14px;
				font-family: inherit;
				transition: background-color 0.2s;
			}
			.retry-btn:hover {
				background-color: #d89f00;
			}
			.input-group { margin-bottom: 1.5rem; text-align: left; }
			.input-group label { display: block; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 0.5rem; }
			.input-group input {
				width: 100%;
				background: rgba(0,0,0,0.3);
				border: 1px solid var(--glass-border);
				border-radius: 0.75rem;
				padding: 0.75rem 1rem;
				color: var(--text-main);
				font-family: inherit;
				font-size: 1.4rem;
				letter-spacing: 0.3em;
				text-align: center;
				outline: none;
				transition: border-color 0.2s;
			}
			.input-group input:focus { border-color: var(--primary); }
			.btn-submit {
				width: 100%;
				padding: 0.85rem;
				border-radius: 9999px;
				border: none;
				background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
				color: white;
				font-family: inherit;
				font-size: 1rem;
				font-weight: 600;
				cursor: pointer;
				transition: opacity 0.2s, transform 0.2s;
			}
			.btn-submit:hover { opacity: 0.9; transform: scale(1.02); }
			.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
			.email-status { margin-top: 1rem; font-size: 0.95rem; min-height: 24px; }
			.email-status.error { color: #f87171; }
		</style>
	</head>
	<body>
		<div class="container">
			<div class="card">
				<div id="main-ui">
					<div class="logo">Verification</div>
					<div class="subtitle">米哈遊登入驗證中心</div>

					<div id="loading-spinner">
						<div class="spinner"></div>
						<div class="status-msg">正在準備驗證環境...</div>
					</div>

					<div id="captcha"></div>
					<div
						id="status-text"
						class="status-msg"
						style="display: none"
					></div>
				</div>

				<div id="email-input-ui" style="display:none;">
					<div class="logo" style="font-size:1.8rem">電子郵件驗證</div>
					<div class="subtitle">驗證碼已發送至您的電子郵件，請輸入 6 位數驗證碼</div>
					<div id="email-error" class="email-status error" style="display:none;margin-bottom:1rem;"></div>
					<div class="input-group">
						<label>驗證碼</label>
						<input id="email-code-input" type="text" maxlength="6" placeholder="000000" autocomplete="one-time-code" inputmode="numeric" />
					</div>
					<button class="btn-submit" id="email-submit-btn" onclick="submitEmailCode()">確認送出</button>
					<div id="email-status" class="email-status"></div>
				</div>

				<div id="success-ui" class="success-area">
					<div class="check-icon">✓</div>
					<h2 style="margin: 0; color: #fff">驗證成功</h2>
					<p style="color: var(--text-dim); margin: 1rem 0 2rem">
						結果已自動傳送至機器人，您可以關閉此分頁。
					</p>
					<a href="https://discord.com/app" class="btn-discord"
						>回到 Discord</a
					>
				</div>


				<div class="footer">Powered by Verification Hub</div>
			</div>
		</div>

		<script>
			const statusText = document.getElementById("status-text");
			const loadingSpinner = document.getElementById("loading-spinner");
			const mainUi = document.getElementById("main-ui");
			const successUi = document.getElementById("success-ui");

			const params = new URLSearchParams(window.location.search);
			const captchaId = params.get("captchaId");
			const riskType = params.get("riskType");
			const riskTypeData = params.get("risk_type");
			const challenge = params.get("challenge");
			const sessionId = params.get("session");
			const successParam = params.get("success");
			const newCaptchaParam = params.get("new_captcha");
			const aigisSessionId = params.get("aigisSessionId");
			const userid = params.get("userid"); // Discord userId
			const useV4 = params.get("use_v4") === "true";

			console.log("[Verification] Params:", {
				captchaId,
				riskType,
				challenge,
				sessionId,
				successParam,
				newCaptchaParam,
				aigisSessionId,
				userid
			});

			if (!sessionId) {
				statusText.textContent =
					"❌ 參數缺失，請重新從 Discord 發起指令";
				statusText.style.display = "block";
				loadingSpinner.style.display = "none";
			} else if (!captchaId) {
				// Email-verify-first mode: no captcha params, start polling for status
				loadingSpinner.style.display = "none";
				statusText.textContent = "⏳ 等待驗證狀態...";
				statusText.style.display = "block";
				pollStatus();
			} else if (useV4 || riskType === "2") {
				// v4 geetest — captchaId 即可，不需要 challenge
				initVerification();
			} else if (!challenge) {
				// v3 但 challenge 缺失，從 MMT 端點補取
				console.log("[Verification] v3 challenge 缺失，自動補請求...");
				fetchMmtAndInit(userid);
			} else {
				initVerification();
			}

			async function fetchMmtAndInit(uid) {
				try {
					const response = await fetch(`/geetest/mmt/${uid}`);
					if (!response.ok) throw new Error("無法獲取驗證碼參數");
					const mmtData = await response.json();
					
					// Initialize Geetest v3 with fetched MMT data
					window.initGeetest(
						{
							gt: mmtData.gt,
							challenge: mmtData.challenge,
							offline: false,
							new_captcha: true,
							product: "popup",
							width: "100%",
							language: "zh-tw",
							https: true
						},
						function (captchaObj) {
							loadingSpinner.style.display = "none";
							captchaObj.appendTo("#captcha");
							captchaObj.onSuccess(async () => {
								const result = captchaObj.getValidate();
								await handleGeetestVerification(uid, result);
							});
							captchaObj.onError(err => {
								console.error("[Geetest MMT] Error:", err);
								statusText.textContent = `❌ 驗證碼載入失敗: ${err.msg || "未知錯誤"}`;
								statusText.style.display = "block";
								loadingSpinner.style.display = "none";
							});
						}
					);
				} catch (err) {
					console.error("[Verification] Fetch MMT error:", err);
					statusText.textContent = `❌ ${err.message}`;
					statusText.style.display = "block";
					loadingSpinner.style.display = "none";
				}
			}

			async function handleGeetestVerification(uid, result) {
				statusText.textContent = "正在同步驗證結果...";
				statusText.style.display = "block";
				try {
					const response = await fetch(`/geetest/verify/${uid}`, {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ sessionId, result })
					});
					const data = await response.json();
					if (data.success) {
						showSuccess();
					} else {
						showError(result, data.message || "驗證同步失敗");
					}
				} catch (err) {
					showError(result, "連線失敗，請手動複製結果");
				}
			}

			function initVerification() {
				// use_v4 param takes priority; fallback to riskType and challenge heuristics
				let version = 4;
				if (useV4) {
					version = 4;
				} else if (challenge && challenge.length === 32 && challenge !== "undefined") {
					version = 3;
				} else if (riskType === "1") {
					version = 3;
				} else if (riskType === "2") {
					version = 4;
				}

				console.log(`[Verification] Detected Version: v${version} (riskType: ${riskType}, challenge length: ${challenge ? challenge.length : 0})`);

				if (version === 4) {
					console.log("[Verification] Using Geetest v4");
					window.initGeetest4(
						{
							captchaId: captchaId,
							language: "zho-tw",
							product: "float",
							https: true,
							riskType: riskTypeData,
							userInfo: JSON.stringify({ session_id: aigisSessionId }),
							apiServers: ["gcaptcha4.captchami.com"]
						},
						function (captchaObj) {
							loadingSpinner.style.display = "none";
							captchaObj.appendTo("#captcha");
							captchaObj.onSuccess(() => {
								const result = captchaObj.getValidate();
								// Inject captcha_id if not already present (required by HoYo)
								if (!result.captcha_id) result.captcha_id = captchaId;
								result.session_id = aigisSessionId;
								handleCallback(result);
							});
							captchaObj.onError(err => {
								console.error("[Geetest v4] Error:", err);
								statusText.textContent = `❌ Geetest v4 載入失敗: ${err.msg || "網路錯誤"}`;
								statusText.style.display = "block";
								loadingSpinner.style.display = "none";
							});
						}
					);
				} else {
					// Force CN server as 9ce3... is likely CN-hosted
					const apiServer = "api.geetest.com"; 
					console.log(`[Verification] Forcing API Server: ${apiServer}`);

					window.initGeetest(
						{
							gt: captchaId,
							challenge: challenge,
							offline: false,
							new_captcha: newCaptchaParam === "1" || newCaptchaParam === "true",
							product: "popup",
							width: "100%",
							language: "zh-tw",
							success: successParam === "1" ? 1 : undefined,
							api_server: apiServer,
							https: true
						},
						function (captchaObj) {
							loadingSpinner.style.display = "none";
							captchaObj.appendTo("#captcha");

							captchaObj.onSuccess(() => {
								const validate = captchaObj.getValidate();
								const result = {
									geetest_challenge: validate.geetest_challenge,
									geetest_validate: validate.geetest_validate,
									geetest_seccode: validate.geetest_seccode,
									session_id: aigisSessionId,
									riskType: riskType
								};
								handleCallback(result);
							});
							captchaObj.onReady(() => {
								loadingSpinner.style.display = "none";
								console.log("[Geetest v3] Ready");
							});
							captchaObj.onError(err => {
								console.error("[Geetest v3] Error detail:", err);
								statusText.textContent = `❌ Geetest v3 載入失敗: ${err.msg || "未知錯誤"}`;
								statusText.style.display = "block";
								loadingSpinner.style.display = "none";

								if (err.msg === "not proof") {
									statusText.innerHTML = `❌ Geetest v3 發生 not proof 錯誤 <br> <button onclick="window.initGeetest4({captchaId:'${captchaId}',language:'zho',product:'float'}, g4Fallback)" class="retry-btn">嘗試使用 v4 強制加載</button>`;
								}
							});
						}
					);
				}
			}

			function g4Fallback(captchaObj) {
				const captchaContainer = document.querySelector("#captcha");
				captchaContainer.innerHTML = ""; // Clear v3
				captchaObj.appendTo("#captcha");
				captchaObj.onSuccess(() => {
					handleCallback(captchaObj.getValidate());
				});
			}

			function handleCallback(result) {
				if (!sessionId) { showError(result, "找不到 Session ID，請複製代碼"); return; }

				statusText.textContent = "正在同步結果...";
				statusText.style.display = "block";

				fetch("/callback", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ sessionId, result })
				})
					.then(res => res.json())
					.then(data => {
						if (data.success) {
							statusText.textContent = "驗證中，請稍候...";
							pollStatus();
						} else {
							showError(result);
						}
					})
					.catch(() => showError(result));
			}

			let pollTimer = null;

			function pollStatus() {
				let elapsed = 0;
				pollTimer = setInterval(async () => {
					elapsed += 1000;
					if (elapsed > 90000) {
						clearInterval(pollTimer);
						showError(null, "等待逾時，請重新從 Discord 發起指令");
						return;
					}
					try {
						const res = await fetch(`/session-status/${sessionId}`);
						const data = await res.json();
						if (data.status === "done") {
							clearInterval(pollTimer);
							showSuccess();
						} else if (data.status === "needs_email_verify") {
							clearInterval(pollTimer);
							showEmailInput(data.error);
						} else if (data.status === "needs_geetest") {
							clearInterval(pollTimer);
							reinitGeetest(data);
						} else if (data.status === "error") {
							clearInterval(pollTimer);
							showError(null, data.message || "驗證失敗");
						}
						// "processing" → keep polling
					} catch (e) { /* ignore, keep polling */ }
				}, 1000);
			}

			function showEmailInput(errorMsg) {
				document.getElementById("captcha").style.display = "none";
				loadingSpinner.style.display = "none";
				statusText.style.display = "none";
				const emailUi = document.getElementById("email-input-ui");
				emailUi.style.display = "block";
				// Reset button and status text in case this is a re-display after a retry
				document.getElementById("email-submit-btn").disabled = false;
				const statusEl = document.getElementById("email-status");
				statusEl.textContent = "";
				statusEl.className = "email-status";
				const errEl = document.getElementById("email-error");
				if (errorMsg) {
					errEl.textContent = `❌ ${errorMsg}`;
					errEl.style.display = "block";
				} else {
					errEl.style.display = "none";
				}
				document.getElementById("email-code-input").value = "";
				setTimeout(() => document.getElementById("email-code-input").focus(), 100);
			}

			document.addEventListener("DOMContentLoaded", () => {
				const codeInput = document.getElementById("email-code-input");
				if (codeInput) codeInput.addEventListener("keydown", e => { if (e.key === "Enter") submitEmailCode(); });
			});

			async function submitEmailCode() {
				const code = document.getElementById("email-code-input").value.trim();
				const statusEl = document.getElementById("email-status");
				const errEl = document.getElementById("email-error");
				const btn = document.getElementById("email-submit-btn");

				if (!code || code.length < 6) {
					statusEl.textContent = "❌ 請輸入完整的 6 位數驗證碼";
					statusEl.className = "email-status error";
					return;
				}

				btn.disabled = true;
				errEl.style.display = "none";
				statusEl.textContent = "正在驗證...";
				statusEl.className = "email-status";

				try {
					const res = await fetch("/callback", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ sessionId, result: { code } })
					});
					const data = await res.json();
					if (data.success) {
						statusEl.textContent = "驗證中，請稍候...";
						pollStatus();
					} else {
						statusEl.textContent = `❌ ${data.message || "傳送失敗，請重試"}`;
						statusEl.className = "email-status error";
						btn.disabled = false;
					}
				} catch (e) {
					statusEl.textContent = "❌ 連線失敗，請重試";
					statusEl.className = "email-status error";
					btn.disabled = false;
				}
			}

			function reinitGeetest(data) {
				// Hide email UI, restore main UI with fresh captcha slot
				document.getElementById("email-input-ui").style.display = "none";
				mainUi.style.display = "block";
				const captchaEl = document.getElementById("captcha");
				captchaEl.innerHTML = "";
				captchaEl.style.display = "flex";
				loadingSpinner.style.display = "none";
				statusText.textContent = "請完成人機驗證...";
				statusText.style.display = "block";

				const useV4Reinit = data.use_v4 === "true" || data.riskType === "2";
				if (useV4Reinit) {
					window.initGeetest4({
						captchaId: data.captchaId,
						language: "zho-tw",
						product: "float",
						https: true,
						riskType: data.risk_type,
						userInfo: JSON.stringify({ session_id: data.aigisSessionId }),
						apiServers: ["gcaptcha4.captchami.com"]
					}, (captchaObj) => {
						statusText.style.display = "none";
						captchaObj.appendTo("#captcha");
						captchaObj.onSuccess(() => {
							const result = captchaObj.getValidate();
							if (!result.captcha_id) result.captcha_id = data.captchaId;
							result.session_id = data.aigisSessionId;
							handleCallback(result);
						});
						captchaObj.onError(err => {
							statusText.textContent = `❌ Geetest v4 載入失敗: ${err.msg || "網路錯誤"}`;
							statusText.style.display = "block";
						});
					});
				} else {
					window.initGeetest({
						gt: data.captchaId,
						challenge: data.challenge,
						offline: false,
						new_captcha: data.new_captcha === "1" || data.new_captcha === "true",
						product: "popup",
						width: "100%",
						language: "zh-tw",
						api_server: "api.geetest.com",
						https: true
					}, (captchaObj) => {
						statusText.style.display = "none";
						captchaObj.appendTo("#captcha");
						captchaObj.onSuccess(() => {
							const validate = captchaObj.getValidate();
							handleCallback({
								geetest_challenge: validate.geetest_challenge,
								geetest_validate: validate.geetest_validate,
								geetest_seccode: validate.geetest_seccode,
								session_id: data.aigisSessionId,
								riskType: data.riskType
							});
						});
						captchaObj.onError(err => {
							statusText.textContent = `❌ Geetest v3 載入失敗: ${err.msg || "未知錯誤"}`;
							statusText.style.display = "block";
						});
					});
				}
			}

			function showSuccess() {
				mainUi.style.display = "none";
				document.getElementById("email-input-ui").style.display = "none";
				successUi.style.display = "block";
			}

			function showError(result, msg = "驗證失敗，請重新從 Discord 發起指令") {
				statusText.textContent = `❌ ${msg}`;
				statusText.style.display = "block";
			}
		</script>
	</body>
</html>
